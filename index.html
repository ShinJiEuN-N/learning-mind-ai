<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>러닝마인드 AI</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="phone" aria-label="러닝마인드 AI 앱">
        <header class="topbar">
          <div>
            <p class="eyebrow">오늘의 학습 시작</p>
            <h1>러닝마인드 AI</h1>
          </div>
          <button class="theme-toggle" id="themeToggle" type="button" aria-label="다크모드 전환">
            <span class="moon-icon" aria-hidden="true">☾</span>
            <span class="sun-icon" aria-hidden="true">☀</span>
          </button>
        </header>

        <nav class="tabs" aria-label="화면 전환">
          <button class="tab active" type="button" data-view="checkin">입력</button>
          <button class="tab" type="button" data-view="coach">계획</button>
          <button class="tab" type="button" data-view="records">기록</button>
        </nav>

        <section class="view active" id="checkinView">
          <section class="hero-panel">
            <div class="hero-content">
              <div class="readiness-ring" aria-label="학습 시작 준비도">
                <svg viewBox="0 0 100 100" aria-hidden="true">
                  <defs>
                    <linearGradient id="readinessGradient" x1="0" y1="0" x2="1" y2="1">
                      <stop class="ring-stop-a" offset="0%" />
                      <stop class="ring-stop-b" offset="55%" />
                      <stop class="ring-stop-c" offset="100%" />
                    </linearGradient>
                  </defs>
                  <circle class="ring-track" cx="50" cy="50" r="41"></circle>
                  <circle class="ring-progress" cx="50" cy="50" r="41"></circle>
                </svg>
                <span class="ring-label"><span id="ringValue">42</span><small>%</small></span>
              </div>
              <div>
                <p class="eyebrow">오늘의 준비도</p>
                <h2 id="comfortQuote">오늘은 다시 시작하는 하루여도 충분해요.</h2>
                <p>지금 상태에 맞는 작은 첫 행동을 찾아드릴게요.</p>
              </div>
            </div>
          </section>

          <form class="checkin-form" id="checkinForm" action="javascript:void(0)">
            <label class="field">
              <span>오늘 할 공부</span>
              <input id="subjectInput" maxlength="48" placeholder="예: 수학 개념 복습" />
            </label>

            <fieldset class="field">
              <legend>막히는 이유</legend>
              <div class="chip-grid" id="reasonGroup">
                <label><input type="radio" name="reason" value="unclear" checked /> 시작점이 안 보임</label>
                <label><input type="radio" name="reason" value="anxiety" /> 실패할까 걱정됨</label>
                <label><input type="radio" name="reason" value="perfection" /> 완벽히 해야 할 것 같음</label>
                <label><input type="radio" name="reason" value="attention" /> 집중 전환이 어려움</label>
                <label><input type="radio" name="reason" value="lowValue" /> 재미나 의미가 약함</label>
                <label><input type="radio" name="reason" value="overload" /> 양이 너무 많게 느껴짐</label>
              </div>
            </fieldset>

            <fieldset class="field">
              <legend>지금 기분</legend>
              <div class="segmented" id="moodGroup">
                <label><input type="radio" name="mood" value="불안" checked /> 불안</label>
                <label><input type="radio" name="mood" value="압도" /> 압도</label>
                <label><input type="radio" name="mood" value="지루함" /> 지루함</label>
                <label><input type="radio" name="mood" value="좌절" /> 좌절</label>
                <label><input type="radio" name="mood" value="무기력" /> 무기력</label>
                <label><input type="radio" name="mood" value="보통" /> 보통</label>
              </div>
            </fieldset>

            <div class="split-fields">
              <label class="field">
                <span>에너지 <b id="energyValue">4</b>/7 <small id="energyLabel">보통</small></span>
                <input id="energyInput" type="range" min="1" max="7" value="4" step="1" />
                <div class="scale-ticks" aria-hidden="true">
                  <span>소진</span>
                  <span>보통</span>
                  <span>충분</span>
                </div>
              </label>

              <label class="field">
                <span>예상 집중 가능 시간</span>
                <select id="timeInput">
                  <option value="10">10분</option>
                  <option value="15">15분</option>
                  <option value="20">20분</option>
                  <option value="25">25분</option>
                  <option value="30" selected>30분</option>
                </select>
              </label>
            </div>

            <button class="primary-action" id="planButton" type="button">계획 받기</button>
          </form>
        </section>

        <section class="view" id="coachView">
          <article class="coach-card">
            <p class="eyebrow">AI 코치</p>
            <h2 id="patternTitle">입력을 먼저 완료해 주세요</h2>
            <p id="coachMessage">오늘 할 공부와 마음 상태를 알려주면 바로 실행 가능한 작은 계획을 보여드려요.</p>
          </article>

          <section class="plan-panel" aria-label="초소형 공부 계획">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">오늘의 첫 행동</p>
                <h2>작은 공부 계획</h2>
              </div>
              <span id="planDuration">대기</span>
            </div>
            <ol class="plan-list" id="planList">
              <li>입력을 마치면 맞춤 계획이 표시됩니다.</li>
            </ol>
            <button class="primary-action" id="startTimerButton" type="button">타이머 시작</button>
          </section>

          <section class="timer-panel" aria-live="polite">
            <div>
              <span>집중 시간</span>
              <strong id="timerText">00:00</strong>
            </div>
            <div class="timer-actions">
              <button type="button" id="pauseTimerButton">일시정지</button>
              <button type="button" id="finishSessionButton">완료</button>
            </div>
          </section>

          <section class="reflection-panel">
            <label class="field">
              <span>한 줄 회고</span>
              <textarea id="reflectionInput" rows="3" placeholder="예: 시작하니 생각보다 괜찮았다."></textarea>
            </label>
            <button class="secondary-action" id="saveReflectionButton" type="button">저장하기</button>
          </section>
        </section>

        <section class="view" id="recordsView">
          <div class="panel-heading records-heading">
            <div>
              <p class="eyebrow">나의 흐름</p>
              <h2>학습 기록</h2>
            </div>
            <span id="recordCount">0회</span>
          </div>

          <div class="stats-grid">
            <div>
              <span>완료율</span>
              <strong id="completionRate">0%</strong>
            </div>
            <div>
              <span>평균 에너지</span>
              <strong id="averageEnergy">0.0</strong>
            </div>
          </div>

          <div class="chart" id="moodChart" aria-label="감정별 기록 분포"></div>
          <div class="record-list" id="recordList">
            <p class="empty-state">아직 저장된 기록이 없습니다.</p>
          </div>
        </section>
      </section>
    </main>
    <script>
      (() => {
        if (window.location.search) {
          window.history.replaceState(null, "", window.location.pathname);
        }

        const quotes = [
          "오늘은 다시 시작하는 하루여도 충분해요.",
          "작게 시작해도 분명히 공부예요.",
          "마음이 무거운 날엔 쉬운 첫걸음이면 돼요.",
          "미룬 시간이 가능성을 없애진 않아요.",
          "불안해도 시작할 수 있어요.",
          "오늘은 증명보다 부담을 덜어내는 날이에요.",
          "천천히 해도 흐름은 다시 만들어져요.",
        ];
        const previous = Number(localStorage.getItem("comfortQuoteIndex") ?? "-1");
        const next = (previous + 1) % quotes.length;
        localStorage.setItem("comfortQuoteIndex", String(next));
        document.querySelector("#comfortQuote").textContent = quotes[next];
      })();
    </script>
    <script>
      (() => {
      const state = {
        currentPlan: null,
        timer: null,
        secondsLeft: 0,
        running: false,
        records: JSON.parse(localStorage.getItem("learningMindRecords") || "[]"),
      };

      const RING_CIRCUMFERENCE = 2 * Math.PI * 41;
      const energyLabels = {
        1: "소진",
        2: "매우 낮음",
        3: "낮음",
        4: "보통",
        5: "조금 충분",
        6: "충분",
        7: "매우 충분",
      };

      const patterns = {
        unclear: {
          title: "시작점을 보이게 하는 계획",
          message: "목표를 작게 정하고 다음 행동을 분명히 만들면 시작 장벽이 낮아져요.",
          steps: ["공부할 범위 제목만 훑기", "오늘 다룰 한 페이지 고르기", "첫 행동을 1문장으로 적기"],
        },
        anxiety: {
          title: "평가 불안을 낮추는 계획",
          message: "결과보다 지금 통제할 수 있는 작은 행동에 초점을 맞춰요.",
          steps: ["익숙한 예제 1개 보기", "틀린 것은 표시만 남기기", "할 수 있었던 것 1개 적기"],
        },
        perfection: {
          title: "완벽주의를 낮추는 계획",
          message: "오늘의 기준은 완성도가 아니라 시도입니다.",
          steps: ["초안처럼 개념 5줄 적기", "문제 2개만 풀기", "완료 여부만 체크하기"],
        },
        attention: {
          title: "주의 전환을 돕는 계획",
          message: "짧은 타이머와 분명한 끝점으로 시작해요.",
          steps: ["알림 끄기", "10분 타이머 켜기", "한 페이지나 한 구간만 끝내기"],
        },
        lowValue: {
          title: "의미와 보상을 붙이는 계획",
          message: "공부의 가치를 가까운 보상과 연결해봐요.",
          steps: ["필요한 이유 1개 적기", "쉬운 것부터 시작하기", "끝나면 작은 보상 정하기"],
        },
        overload: {
          title: "인지 부담을 줄이는 계획",
          message: "가장 작은 묶음 하나만 잡아도 충분합니다.",
          steps: ["해야 할 것을 3개 이하로 나누기", "가장 부담 낮은 것 고르기", "선택한 것만 15분 진행하기"],
        },
      };

      const selected = (name) => document.querySelector(`input[name="${name}"]:checked`)?.value;

      function switchView(name) {
        document.querySelectorAll(".tab").forEach((tab) => tab.classList.toggle("active", tab.dataset.view === name));
        document.querySelectorAll(".view").forEach((view) => view.classList.remove("active"));
        document.querySelector(`#${name}View`)?.classList.add("active");
        if (name === "records") {
          renderRecords();
        }
      }

      function renderTimer() {
        const minutes = String(Math.floor(state.secondsLeft / 60)).padStart(2, "0");
        const seconds = String(state.secondsLeft % 60).padStart(2, "0");
        document.querySelector("#timerText").textContent = `${minutes}:${seconds}`;
      }

      function updateReadiness() {
        const energy = Number(document.querySelector("#energyInput").value);
        const time = Number(document.querySelector("#timeInput").value);
        const mood = selected("mood") || "불안";
        const moodPenalty = { 보통: 0, 지루함: 7, 좌절: 10, 무기력: 11, 압도: 12, 불안: 12 }[mood] ?? 8;
        const score = Math.max(20, Math.min(95, Math.round(22 + energy * 7 + (Math.min(time, 30) / 30) * 18 - moodPenalty)));
        document.querySelector("#energyValue").textContent = energy;
        document.querySelector("#energyLabel").textContent = energyLabels[energy];
        document.querySelector("#ringValue").textContent = score;
        document.querySelector(".ring-progress").style.strokeDashoffset = String(RING_CIRCUMFERENCE * (1 - score / 100));
      }

      function choosePlanDuration(energy, focusTime, mood) {
        if (energy <= 2 || ["불안", "압도", "무기력", "좌절"].includes(mood)) return 10;
        if (energy >= 6 && focusTime >= 25 && mood === "보통") return 25;
        if (focusTime <= 10) return 10;
        if (focusTime <= 20) return 15;
        return 20;
      }

      function createPlan(event) {
        event?.preventDefault();
        const reason = selected("reason") || "unclear";
        const mood = selected("mood") || "불안";
        const energy = Number(document.querySelector("#energyInput")?.value || 4);
        const focusTime = Number(document.querySelector("#timeInput")?.value || 15);
        const subject = document.querySelector("#subjectInput")?.value.trim() || "오늘 공부";
        const pattern = patterns[reason] || patterns.unclear;
        const duration = choosePlanDuration(energy, focusTime, mood);

        state.currentPlan = {
          subject,
          reason,
          mood,
          energy,
          focusTime,
          duration,
          pattern: pattern.title,
          steps: pattern.steps,
          completed: false,
          createdAt: new Date().toISOString(),
        };
        state.secondsLeft = duration * 60;
        state.running = false;

        document.querySelector("#patternTitle").textContent = pattern.title;
        document.querySelector("#coachMessage").textContent = `${subject}를 끝내는 것이 아니라 시작하는 데 집중해요. ${pattern.message}`;
        document.querySelector("#planDuration").textContent = `${duration}분`;
        document.querySelector("#planList").innerHTML = pattern.steps.map((step) => `<li>${step}</li>`).join("");
        document.querySelector("#pauseTimerButton").textContent = "일시정지";
        renderTimer();
        switchView("coach");
      }

      function startTimer(event) {
        event?.preventDefault();
        if (!state.currentPlan || state.running) return;
        state.running = true;
        state.timer = setInterval(() => {
          state.secondsLeft = Math.max(0, state.secondsLeft - 1);
          renderTimer();
          if (state.secondsLeft === 0) finishSession();
        }, 1000);
      }

      function toggleTimer(event) {
        event?.preventDefault();
        if (!state.currentPlan) return;
        if (state.running) {
          clearInterval(state.timer);
          state.running = false;
          document.querySelector("#pauseTimerButton").textContent = "계속";
        } else {
          document.querySelector("#pauseTimerButton").textContent = "일시정지";
          startTimer(event);
        }
      }

      function finishSession(event) {
        event?.preventDefault?.();
        if (!state.currentPlan) return;
        clearInterval(state.timer);
        state.running = false;
        state.currentPlan.completed = true;
        document.querySelector("#timerText").textContent = "완료";
      }

      function saveReflection(event) {
        event?.preventDefault();
        if (!state.currentPlan) return;
        const reflection = document.querySelector("#reflectionInput").value.trim() || "회고를 남기지 않았습니다.";
        state.records.unshift({
          ...state.currentPlan,
          reflection,
          savedAt: new Date().toISOString(),
        });
        localStorage.setItem("learningMindRecords", JSON.stringify(state.records));
        document.querySelector("#reflectionInput").value = "";
        renderRecords();
        switchView("records");
      }

      function renderRecords() {
        document.querySelector("#recordCount").textContent = `${state.records.length}회`;
        const completed = state.records.filter((record) => record.completed).length;
        const completionRate = state.records.length ? Math.round((completed / state.records.length) * 100) : 0;
        const averageEnergy = state.records.length
          ? (state.records.reduce((sum, record) => sum + record.energy, 0) / state.records.length).toFixed(1)
          : "0.0";
        document.querySelector("#completionRate").textContent = `${completionRate}%`;
        document.querySelector("#averageEnergy").textContent = averageEnergy;

        const list = document.querySelector("#recordList");
        if (!state.records.length) {
          list.innerHTML = '<p class="empty-state">아직 저장된 기록이 없습니다.</p>';
          return;
        }

        list.innerHTML = state.records.map((record) => `
          <article class="record-card">
            <strong>${record.subject}</strong>
            <p>${record.reflection}</p>
            <div class="record-meta">
              <span>${record.pattern}</span>
              <span>${record.mood}</span>
              <span>${record.duration}분</span>
            </div>
          </article>
        `).join("");
      }

      function applyTheme(isDark) {
        document.body.classList.toggle("dark-mode", isDark);
        document.querySelector("#themeSwitch")?.toggleAttribute("checked", isDark);
        localStorage.setItem("learningMindTheme", isDark ? "dark" : "light");
      }

      document.querySelector("#themeToggle").addEventListener("click", () => {
        applyTheme(!document.body.classList.contains("dark-mode"));
      });

      document.querySelectorAll(".tab").forEach((tab) => {
        tab.addEventListener("click", () => switchView(tab.dataset.view));
      });
      document.querySelector("#checkinForm").addEventListener("submit", createPlan);
      document.querySelector("#planButton").addEventListener("click", createPlan);
      document.querySelector("#energyInput").addEventListener("input", updateReadiness);
      document.querySelector("#checkinForm").addEventListener("input", updateReadiness);
      document.querySelector("#startTimerButton").addEventListener("click", startTimer);
      document.querySelector("#pauseTimerButton").addEventListener("click", toggleTimer);
      document.querySelector("#finishSessionButton").addEventListener("click", finishSession);
      document.querySelector("#saveReflectionButton").addEventListener("click", saveReflection);

      if (localStorage.getItem("learningMindTheme") === "dark") {
        applyTheme(true);
      }
      updateReadiness();
      renderRecords();
      })();
    </script>
  </body>
</html>
